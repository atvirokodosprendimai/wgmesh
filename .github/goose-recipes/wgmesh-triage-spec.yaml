---
version: "1.0.0"
title: "wgmesh Implementation"
description: >-
  Implements code and/or documentation changes for wgmesh based on a
  specification

parameters:
  - key: spec_file
    input_type: string
    requirement: required
    description: "Path to the specification file (specs/issue-N-spec.md)"

extensions:
  - type: builtin
    name: developer

prompt: |
  You are writing a specification document only for the wgmesh project, a
  Go-based WireGuard mesh network builder.

  Project Context:
  - Language: Go 1.25, module: github.com/atvirokodosprendimai/wgmesh
  - Output: concrete specification for later Goose implementation
  - Do NOT write implementation code
  - Do NOT modify files outside {{ spec_file }}
  - Do NOT create commits, branches, labels, comments, or pull requests
  - The workflow will handle git, labels, and PR creation

  CRITICAL - Use Real Codebase Facts:
  Before writing, read existing source files to understand packages, types,
  functions, tests, workflows, and scripts. Do NOT guess file paths or names.

  Required inputs:
  1. Read /tmp/issue-context.md for issue details
  2. Read /tmp/spec-instructions.md for specification contract
  3. Read relevant repository files before writing

  Specification Steps:
  1. Analyze the issue carefully
  2. Explore codebase: read existing files in relevant packages
  3. Create {{ spec_file }} using template in /tmp/spec-instructions.md
  4. Include sections: Classification, Problem Analysis, Proposed Approach,
     Implementation Tasks, Affected Files, Acceptance Criteria, Estimated Complexity
  5. Make tasks exact enough for later Goose execution without guesswork
  6. If issue shouldn't be implemented, classify as wont-do or needs-info

  IMPORTANT: /tmp/spec-instructions.md mentions PR creation — treat those as
  title/body conventions only. Do NOT run git or gh commands.

  Now write the specification to {{ spec_file }}.

settings:
  goose_provider: "anthropic"
  goose_model: "GLM-5.1"
