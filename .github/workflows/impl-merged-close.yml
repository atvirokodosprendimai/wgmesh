name: Implementation Merged — Close Issue

# When an `impl: Issue #N - ...` PR merges, this workflow decides whether to
# close the linked issue, send it to verification limbo, or block on missing
# tests.
#
# Process bug (2026-04-29): wgmesh#540 was auto-closed when PR #544 merged,
# but the PR fixed only one of two affected code paths. The user re-reported
# the same bug 6 days later. "Linked PR merged" is necessary but not
# sufficient signal for closing bug-class issues.
#
# Policy (post-#558, post-this-PR):
#   - issue does NOT carry a bug label (feature, chore, docs) → auto-close
#     as before. Tests structurally validate non-bug work.
#   - issue carries `type: bug` (or bare `bug`):
#       - L2: PR diff must add at least one new `func TestXxx(t *testing.T)`
#         declaration in some `*_test.go` file. No new test func → block close,
#         add `awaiting-tests` label.
#       - L3: at least one significant token from the issue body's
#         "Steps to Reproduce" (or whole body fallback) must appear in the
#         new test names OR the PR body. No keyword match → block close,
#         add `awaiting-tests` label with details.
#       - L4 (post-#568): if the PR diff touches `pkg/daemon/`,
#         `pkg/discovery/`, or `pkg/rpc/`, at least one
#         `*_integration_test.go` file must appear in the same diff.
#         Predicate-only unit tests cannot reproduce relay-flap,
#         hole-punch, NAT-traversal, or peer-discovery bug classes.
#         No integration test → block close, add `awaiting-tests`.
#       - all pass → add `awaiting-verification` label, ping reporter.
#         For network-path bugs the verifier workflow (e2e-verifier.yml)
#         then runs against the merge SHA; e2e-verify-close.yml flips
#         `awaiting-verification` to `verified` (close) or `e2e-failed`
#         (reopen) by conclusion. Non-network bugs still close on a
#         reporter "verified" comment via verify-comment-close.yml.

on:
  # pull_request_target instead of pull_request so Copilot-coding-agent
  # `copilot/*` PRs do not freeze the run in `action_required` during their
  # draft phase. By the time `closed` + `merged==true` fires, the merge
  # commit is already on main with maintainer approval, so running the
  # handler from `merge_commit_sha` under maintainer-context permissions
  # is the same trust as any post-merge main commit. See #79 (extended
  # scope: closed-event family).
  pull_request_target:
    types: [closed]

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  close-issue:
    if: >-
      github.event.pull_request.merged == true &&
      !contains(github.event.pull_request.title, 'spec:') &&
      !contains(github.event.pull_request.title, 'heal:') &&
      !contains(github.event.pull_request.title, 'loop:')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout triggering merge commit (deterministic handler version)
        # actions/checkout defaults to github.ref, which on
        # `pull_request: closed` events is the BASE branch ref (e.g.,
        # refs/heads/main) — not the merge commit SHA. main can advance
        # during job queue, drifting the handler version from the
        # workflow revision that triggered the run. Pin explicitly to
        # the merge commit SHA so workflow + handler stay synchronized
        # for this run.
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}

      - name: Ensure verification + tests labels exist
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create awaiting-verification \
            --repo "${{ github.repository }}" \
            --description "Bug fix merged; awaiting reporter confirmation before close" \
            --color FBCA04 \
            --force 2>/dev/null || true
          gh label create awaiting-tests \
            --repo "${{ github.repository }}" \
            --description "Bug fix PR did not add a regression test; needs test before verification can begin" \
            --color D93F0B \
            --force 2>/dev/null || true

      - name: Close linked issue, gate on tests, or send to verification
        uses: actions/github-script@v8
        with:
          github-token: ${{ github.token }}
          script: |
            const handler = require('./scripts/workflows/impl-merged-close-handler.js');
            await handler({github, context, core});
