name: OASDiff Template

on:
  workflow_call:
    inputs:
      openapi-path:
        required: false
        type: string
        default: openapi.yaml
      base-ref:
        required: false
        type: string
        default: ${{ github.event.repository.default_branch }}
      fail-on-warning:
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  pull-requests: read

jobs:
  oasdiff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Resolve base OpenAPI document
        run: |
          git fetch origin "${{ inputs.base-ref }}" --depth=1
          git show "origin/${{ inputs.base-ref }}:${{ inputs.openapi-path }}" > /tmp/base-openapi.yaml
      - uses: oasdiff/oasdiff-action/breaking@v0.0.46
        with:
          base: /tmp/base-openapi.yaml
          revision: ${{ inputs.openapi-path }}
          fail-on: ${{ inputs.fail-on-warning && 'WARN' || 'ERR' }}
