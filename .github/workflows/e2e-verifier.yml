name: E2E Verifier

# Triggered when a `type: bug` PR touching pkg/daemon/, pkg/discovery/, or
# pkg/rpc/ merges. Runs a fast Hetzner integration subset (tiers 1, 2, 4)
# against the merge commit so we can decide whether the linked issue
# actually closes (`verified`) or reopens (`e2e-failed`). The
# downstream e2e-verify-close.yml workflow consumes this run's
# conclusion via workflow_run.
#
# Subset rationale (from docs/plans/2026-05-06-002-...):
#   - Tier 1 (Topology, ~5 min)         — basic mesh formation.
#   - Tier 2 (Peer Lifecycle, ~12 min)  — relay paths.
#   - Tier 4 (Partitions, ~15 min)      — partition-handling.
# Tiers 3 (chaos), 5 (NAT skips), 6 (chaos monkey), 7 (soak) stay on
# tag-push releases; ~30 min wall is the budget for per-merge feedback.

on:
  pull_request:
    types: [closed]
    paths:
      - 'pkg/daemon/**'
      - 'pkg/discovery/**'
      - 'pkg/rpc/**'
  workflow_dispatch:
    inputs:
      merge_commit_sha:
        description: 'Merge commit SHA to verify (overrides pull_request.merge_commit_sha)'
        required: false
        default: ''
      pr_number:
        description: 'PR number to correlate with the verifier conclusion'
        required: true
      tiers:
        description: 'Test tiers to run (comma-separated). Default 1,2,4 — the per-merge subset.'
        required: false
        default: '1,2,4'
      vm_count:
        description: 'Number of VMs per tier (1 introducer + N-1 nodes)'
        required: false
        default: '5'

# Per-PR concurrency so retries cancel in-flight; never collides with the
# `hetzner-integration` group (different name) used by tag-push runs.
concurrency:
  group: e2e-verifier-pr-${{ github.event.pull_request.number || inputs.pr_number || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

env:
  HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
  GO_VERSION: '1.25'

jobs:
  # -----------------------------------------------------------------------
  # Phase 1: Build the binary once, share via artifact.
  # Conditioned on merged + type:bug for the pull_request trigger; the
  # workflow_dispatch path runs unconditionally so operators can backfill
  # against arbitrary merge SHAs (per plan U7).
  # -----------------------------------------------------------------------
  build:
    name: Build Binary
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true &&
        contains(github.event.pull_request.labels.*.name, 'type: bug'))
    outputs:
      tiers: ${{ steps.parse.outputs.tiers }}
      pr_number: ${{ steps.correlate.outputs.pr_number }}
      checkout_ref: ${{ steps.correlate.outputs.checkout_ref }}
    steps:
      - name: Resolve checkout ref + PR correlation
        id: correlate
        env:
          PR_MERGE_SHA: ${{ github.event.pull_request.merge_commit_sha }}
          INPUT_SHA: ${{ inputs.merge_commit_sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          INPUT_PR: ${{ inputs.pr_number }}
        run: |
          ref="$INPUT_SHA"
          if [ -z "$ref" ]; then
            ref="$PR_MERGE_SHA"
          fi
          if [ -z "$ref" ]; then
            echo "Neither inputs.merge_commit_sha nor pull_request.merge_commit_sha is set; refusing to checkout an unspecified ref." >&2
            exit 1
          fi
          pr="$INPUT_PR"
          if [ -z "$pr" ]; then
            pr="$PR_NUMBER"
          fi
          echo "checkout_ref=$ref" >> "$GITHUB_OUTPUT"
          echo "pr_number=$pr" >> "$GITHUB_OUTPUT"
          echo "Verifying ref=$ref pr=$pr"

      - name: Checkout merged tree at ${{ steps.correlate.outputs.checkout_ref }}
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.correlate.outputs.checkout_ref }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build binary (linux/arm64)
        env:
          CHECKOUT_REF: ${{ steps.correlate.outputs.checkout_ref }}
        run: |
          short="${CHECKOUT_REF:0:8}"
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -v \
            -ldflags="-s -w -X main.version=vfy-${short}" \
            -o wgmesh-linux-arm64 .
          ls -lh wgmesh-linux-arm64

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: wgmesh-binary
          path: wgmesh-linux-arm64
          retention-days: 1

      - name: Parse tiers into matrix
        id: parse
        env:
          INPUT_TIERS: ${{ inputs.tiers }}
        run: |
          TIERS="${INPUT_TIERS:-1,2,4}"
          # Convert "1,2,4" → ["1","2","4"] JSON array
          JSON=$(echo "$TIERS" | tr ',' '\n' | jq -R . | jq -s -c .)
          echo "tiers=$JSON" >> "$GITHUB_OUTPUT"
          echo "Tier matrix: $JSON"

  # -----------------------------------------------------------------------
  # Phase 2: Run each verifier tier in parallel, each with its own VMs.
  # VM_PREFIX is per-PR-and-tier so retries don't collide with concurrent
  # verifier runs for other PRs or with the hetzner-integration tag run.
  # -----------------------------------------------------------------------
  tier:
    name: "Tier ${{ matrix.tier }}"
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        tier: ${{ fromJson(needs.build.outputs.tiers) }}

    steps:
      - name: Checkout merged tree
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.build.outputs.checkout_ref }}

      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: wgmesh-binary

      - name: Install hcloud CLI
        run: |
          curl -sL https://github.com/hetznercloud/cli/releases/latest/download/hcloud-linux-amd64.tar.gz \
            | tar xz -C /usr/local/bin hcloud
          hcloud version

      - name: Generate ephemeral SSH key
        run: |
          ssh-keygen -t ed25519 -f ~/.ssh/wgmesh-ci -N "" -q
          echo "SSH_KEY_FILE=$HOME/.ssh/wgmesh-ci" >> "$GITHUB_ENV"

      - name: Compute VM_PREFIX
        id: prefix
        env:
          PR_NUMBER: ${{ needs.build.outputs.pr_number }}
          TIER: ${{ matrix.tier }}
        run: |
          pr="${PR_NUMBER:-unknown}"
          echo "vm_prefix=wgmesh-vfy-pr${pr}-t${TIER}" >> "$GITHUB_OUTPUT"

      - name: Clean up orphaned VMs
        env:
          SSH_KEY_FILE: ${{ env.SSH_KEY_FILE }}
          VM_PREFIX: ${{ steps.prefix.outputs.vm_prefix }}
        run: |
          source testlab/cloud/lib.sh
          source testlab/cloud/provision.sh
          teardown_orphans || true

      - name: "Run Tier ${{ matrix.tier }} verifier subset"
        id: tests
        env:
          SSH_KEY_FILE: ${{ env.SSH_KEY_FILE }}
          WGMESH_RUN_ID: "${{ github.run_id }}-vfy-t${{ matrix.tier }}"
          VM_PREFIX: ${{ steps.prefix.outputs.vm_prefix }}
          WGMESH_PPROF: "1"
          VM_COUNT: ${{ inputs.vm_count || '5' }}
          TIER: ${{ matrix.tier }}
        run: |
          chmod +x testlab/cloud/*.sh wgmesh-linux-arm64
          ./testlab/cloud/test-cloud.sh \
            --binary "$PWD/wgmesh-linux-arm64" \
            --vms "$VM_COUNT" \
            --tiers "$TIER"

      - name: Generate test report
        if: always()
        run: |
          if [ -f /tmp/wgmesh-ci-logs/trace.jsonl ]; then
            python3 testlab/cloud/gen-report.py \
              /tmp/wgmesh-ci-logs/trace.jsonl \
              /tmp/wgmesh-ci-logs/report.html || true
          fi

      - name: Tier summary
        if: always()
        env:
          TIER: ${{ matrix.tier }}
          OUTCOME: ${{ steps.tests.outcome }}
        run: |
          {
            echo "## Tier ${TIER} Results"
            echo ""
            if [ -f /tmp/wgmesh-ci-logs/tier-summary.md ]; then
              cat /tmp/wgmesh-ci-logs/tier-summary.md
            elif [ "$OUTCOME" = "success" ]; then
              echo "All tests passed."
            else
              echo "Tests failed or were cancelled. Check logs for details."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "tier-${{ matrix.tier }}-logs"
          path: /tmp/wgmesh-ci-logs/
          retention-days: 7
          if-no-files-found: ignore

      - name: Teardown VMs (safety net)
        if: always()
        env:
          SSH_KEY_FILE: ${{ env.SSH_KEY_FILE }}
          WGMESH_RUN_ID: "${{ github.run_id }}-vfy-t${{ matrix.tier }}"
          VM_PREFIX: ${{ steps.prefix.outputs.vm_prefix }}
        run: |
          source testlab/cloud/lib.sh
          source testlab/cloud/provision.sh
          teardown_vms || true
          teardown_orphans || true

  # -----------------------------------------------------------------------
  # Phase 3: Aggregate results from all verifier tiers.
  # Conclusion of this job (and the parent workflow run) is what
  # e2e-verify-close.yml watches for via workflow_run.
  # -----------------------------------------------------------------------
  results:
    name: Verifier Results
    runs-on: ubuntu-latest
    needs: [build, tier]
    if: always() && needs.build.result == 'success' && needs.tier.result != 'skipped'
    timeout-minutes: 5
    steps:
      - name: Download all logs
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          pattern: "tier-*-logs"
          merge-multiple: true
          path: logs

      - name: Summary
        run: |
          {
            echo "## E2E Verifier Results"
            echo ""

            if [ -d logs ] && ls logs/*.log >/dev/null 2>&1; then
              for log in logs/*.log; do
                node=$(basename "$log" .log)
                errors=$(grep -ciE 'panic|fatal|data race' "$log" 2>/dev/null || echo 0)
                if [ "$errors" -gt 0 ]; then
                  echo "- **$node**: $errors error pattern(s)"
                else
                  echo "- $node: clean"
                fi
              done
            else
              echo "No log files collected."
            fi

            echo ""
            echo "See individual **Tier N** jobs for PASS/FAIL/SKIP details."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail when any verifier tier failed
        if: needs.tier.result != 'success'
        run: |
          echo "Verifier tier result was '${{ needs.tier.result }}'; failing aggregate job."
          exit 1
