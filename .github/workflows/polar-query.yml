name: polar-query
on:
  workflow_dispatch:
jobs:
  query:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Polar products and checkout links
        env:
          POLAR_TOKEN: ${{ secrets.POLAR_TOKEN }}
        run: |
          echo "=== Organizations ==="
          curl -sf -H "Authorization: Bearer $POLAR_TOKEN" \
            "https://api.polar.sh/v1/organizations?limit=10" | jq '.items[] | {id, name, slug}'

          ORG_ID=$(curl -sf -H "Authorization: Bearer $POLAR_TOKEN" \
            "https://api.polar.sh/v1/organizations?limit=10" | jq -r '.items[0].id')
          echo "Org ID: $ORG_ID"

          echo "=== Products ==="
          curl -sf -H "Authorization: Bearer $POLAR_TOKEN" \
            "https://api.polar.sh/v1/products?organization_id=$ORG_ID&limit=20" \
            | jq '.items[] | {id, name, prices: [.prices[] | {amount_type, price_amount}]}'

          echo "=== Checkout Links ==="
          curl -sf -H "Authorization: Bearer $POLAR_TOKEN" \
            "https://api.polar.sh/v1/checkout-links?organization_id=$ORG_ID&limit=20" \
            | jq '.items[] | {id, url, product_id}'
