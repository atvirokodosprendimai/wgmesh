---
# yamllint disable rule:line-length
name: Goose Issue Triage

# Triggered when an issue is labeled with 'needs-triage'.
# Runs Goose in spec-only mode to produce a specification document and PR.

'on':
  issues:
    types: [labeled]

permissions:
  issues: write
  contents: write
  pull-requests: write

env:
  ANTHROPIC_API_KEY: ${{ secrets.ZAI_API_KEY }}
  ANTHROPIC_HOST: "https://api.z.ai/api/anthropic"

jobs:
  triage:
    if: github.event.label.name == 'needs-triage'
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      # ── Setup ──────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.PUSH_TOKEN }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Install Goose CLI
        run: |
          curl -fsSL "https://github.com/block/goose/releases/latest/download/download_cli.sh" \
            -o /tmp/goose-install.sh
          CONFIGURE=false bash /tmp/goose-install.sh
          rm /tmp/goose-install.sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          $HOME/.local/bin/goose --version

      # ── Validate prerequisites ──────────────────────────
      - name: Validate API key is configured
        env:
          KEY: ${{ secrets.ZAI_API_KEY }}
        run: |
          if [ -z "$KEY" ]; then
            echo "::error::ZAI_API_KEY secret is not configured. Add it in Settings > Secrets > Actions."
            exit 1
          fi

      - name: Extract issue context
        id: issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PUSH_TOKEN }}
          script: |
            const fs = require('fs');
            const issueNumber = context.issue.number;
            const issue = context.payload.issue;
            const safeTitle = (issue.title || '')
              .replace(/\r?\n/g, ' ')
              .replace(/`/g, "'")
              .replace(/[<>]/g, '')
              .replace(/\s+/g, ' ')
              .trim()
              .slice(0, 180);

            const labels = (issue.labels || []).map((label) => label.name).join(', ');
            const issueContext = [
              `# Issue #${issueNumber}: ${issue.title || ''}`,
              ``,
              `URL: ${issue.html_url}`,
              `Author: ${issue.user?.login || 'unknown'}`,
              `Created: ${issue.created_at}`,
              `Labels: ${labels || '(none)'}`,
              ``,
              `## Body`,
              issue.body || '',
            ].join('\n');
            fs.writeFileSync('/tmp/issue-context.md', issueContext);

            // Build the spec-writing instructions for the agent_assignment payload.
            // These instructions are passed directly to Copilot coding agent and
            // tell it to produce a specification document, NOT implementation code.
            const specInstructions = [
              `Analyze this issue and create a **specification document only**. Do NOT write implementation code.`,
              ``,
              `CRITICAL: This spec will be consumed by an AI coding agent (Goose) that needs EXACT, CONCRETE instructions.`,
              `Vague descriptions cause empty commits. Every section must be specific enough that an agent can execute it`,
              `without judgment or guesswork.`,
              ``,
              `Instructions:`,
              `1. Read the issue title and description carefully`,
              `2. Explore the codebase thoroughly: read existing files in the relevant packages before writing the spec`,
              `3. Create a file specs/issue-${issueNumber}-spec.md using this template:`,
              ``,
              `# Specification: Issue #${issueNumber}`,
              ``,
              `## Classification`,
              `<!-- One of: fix, feature, refactor, wont-do, needs-info -->`,
              ``,
              `## Problem Analysis`,
              `<!-- Concrete description of what is missing. Reference actual existing code by file:line where relevant. -->`,
              ``,
              `## Implementation Tasks`,
              `<!-- MANDATORY: List every task as an exact action. Use this format for each task: -->`,
              ``,
              `### Task 1: <short name>`,
              `- **File:** \`path/to/file.go\` (create) OR \`path/to/file.go\` (modify)`,
              `- **What:** Add function \`FuncName(args) (ReturnType, error)\` that does X`,
              `- **Detail:** <2-4 sentences describing the exact logic — no ambiguity>`,
              ``,
              `### Task 2: <short name>`,
              `- **File:** \`path/to/file_test.go\` (create or modify)`,
              `- **What:** Add \`TestFuncName_Scenario\` that asserts Y`,
              `- **Detail:** Use table-driven test. Mock Z using httptest/fakefs/etc.`,
              ``,
              `<!-- Repeat for every file that changes. Do NOT use placeholders like "modify as needed". -->`,
              `<!-- If a task requires wiring (e.g. registering a route in api.go), list that as its own task. -->`,
              ``,
              `## Affected Files`,
              `<!-- Exhaustive list — exactly the files touched by Implementation Tasks above -->`,
              `\`\`\``,
              `pkg/foo/bar.go       (new)`,
              `pkg/foo/bar_test.go  (new)`,
              `pkg/foo/api.go       (modify: add route)`,
              `\`\`\``,
              ``,
              `## Acceptance Criteria`,
              `<!-- Written as testable assertions. Each line must be verifiable by running go test. -->`,
              `- \`go build ./...\` passes`,
              `- \`go test ./pkg/foo/...\` passes including new tests`,
              `- <specific behavior: e.g. "GET /edges returns 200 with JSON array">`,
              ``,
              `## Estimated Complexity`,
              `<!-- One of: low (1-2 files, <100 lines), medium (3-5 files), high (>5 files or external deps) -->`,
              ``,
              `4. Open a PR titled: spec: Issue #${issueNumber} - ${safeTitle}`,
              `   Include "Issue #${issueNumber}" in the title for pipeline traceability.`,
              `5. Target the main branch`,
              `6. The PR should contain ONLY the spec file - no code changes`,
            ].join('\n');
            fs.writeFileSync('/tmp/spec-instructions.md', specInstructions);

            core.setOutput('issue_number', String(issueNumber));
            core.setOutput('safe_title', safeTitle);
            core.setOutput('spec_branch', `spec/issue-${issueNumber}`);

      # ── Prepare spec branch ────────────────────────────
      - name: Create spec branch
        env:
          SPEC_BRANCH: ${{ steps.issue.outputs.spec_branch }}
        run: |
          git checkout main
          if git ls-remote --heads origin "$SPEC_BRANCH" | grep -q "refs/heads/${SPEC_BRANCH}$"; then
            git push origin --delete "$SPEC_BRANCH"
          fi
          git checkout -b "$SPEC_BRANCH"

      # ── Run Goose in spec-only mode ────────────────────
      - name: Run Goose with recipe
        id: goose
        env:
          GOOSE_DISABLE_SESSION_NAMING: "true"
          GOOSE_MODE: "auto"
          ISSUE_NUM: ${{ steps.issue.outputs.issue_number }}
        run: |
          SPEC_FILE="specs/issue-${ISSUE_NUM}-spec.md"
          GOOSE_START=$(date +%s)
          set +e
          goose run \
            --recipe .github/goose-recipes/wgmesh-triage-spec.yaml \
            --params "spec_file=$SPEC_FILE" \
            --no-session \
            2>&1 | tee /tmp/goose-output.log
          GOOSE_EXIT=$?
          set -e

          GOOSE_END=$(date +%s)
          echo "goose_exit=$GOOSE_EXIT" >> "$GITHUB_OUTPUT"
          echo "goose_duration=$((GOOSE_END - GOOSE_START))" >> "$GITHUB_OUTPUT"
          echo "goose_lines=$(wc -l < /tmp/goose-output.log)" >> "$GITHUB_OUTPUT"

          # Non-zero exit = spec generation failed.
          if [ "$GOOSE_EXIT" -ne 0 ]; then
            CLEAN_LOG=$(grep -vE 'grep|\.yml|\.yaml|\.sh|^\s*#|^\s*//|^\d+:' /tmp/goose-output.log || true)
            if echo "$CLEAN_LOG" | grep -qiE "401 unauthorized|authentication failed|api key is invalid"; then
              echo "::error::Authentication failure (non-recoverable)"
            else
              echo "::error::Goose exited $GOOSE_EXIT while generating spec"
            fi
            exit "$GOOSE_EXIT"
          fi
          echo "goose_succeeded=$( [ $GOOSE_EXIT -eq 0 ] && echo true || echo false )" >> "$GITHUB_OUTPUT"

      - name: Guard non-empty spec output
        env:
          ISSUE_NUM: ${{ steps.issue.outputs.issue_number }}
        run: |
          SPEC_FILE="specs/issue-${ISSUE_NUM}-spec.md"
          if [ ! -s "$SPEC_FILE" ]; then
            echo "::error::Goose did not create a non-empty spec file: $SPEC_FILE"
            exit 1
          fi

      - name: Sanitise spec
        env:
          ISSUE_NUM: ${{ steps.issue.outputs.issue_number }}
        run: |
          SPEC_FILE="specs/issue-${ISSUE_NUM}-spec.md"
          if ! cat "$SPEC_FILE" | bash company/scripts/sanitise.sh > /dev/null; then
            echo "::error::Sanitise gate failed for $SPEC_FILE"
            exit 1
          fi

      # ── Commit, PR, and label swap ─────────────────────
      - name: Commit and push spec
        env:
          ISSUE_NUM: ${{ steps.issue.outputs.issue_number }}
          SPEC_BRANCH: ${{ steps.issue.outputs.spec_branch }}
        run: |
          SPEC_FILE="specs/issue-${ISSUE_NUM}-spec.md"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$SPEC_FILE"
          if git diff --cached --quiet; then
            echo "::error::Spec file exists but produced no staged changes: $SPEC_FILE"
            exit 1
          fi
          git commit -m "spec: Issue #${ISSUE_NUM} - Goose triage"
          git push origin "$SPEC_BRANCH"

      - name: Open spec PR and swap issue label
        uses: actions/github-script@v7
        env:
          ISSUE_NUM: ${{ steps.issue.outputs.issue_number }}
          SAFE_TITLE: ${{ steps.issue.outputs.safe_title }}
          SPEC_BRANCH: ${{ steps.issue.outputs.spec_branch }}
        with:
          github-token: ${{ secrets.PUSH_TOKEN }}
          script: |
            const issueNum = process.env.ISSUE_NUM;
            const safeTitle = process.env.SAFE_TITLE;
            const specBranch = process.env.SPEC_BRANCH;

            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `spec: Issue #${issueNum} - ${safeTitle}`,
              head: specBranch,
              base: 'main',
              draft: false,
              body: [
                `## Goose-authored specification`,
                ``,
                `This is a Goose-authored spec for issue #${issueNum}.`,
                ``,
                `The triage path now uses the self-hosted Goose CLI instead of the broken Copilot agent assignment flow.`,
                `The workflow is empty-output guarded, sanitise-gated, and replaces \`copilot-triage.yml\` to prevent double-firing on \`needs-triage\`.`,
              ].join('\n')
            });

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: parseInt(issueNum),
              body: `Goose-authored specification PR created: #${pr.number}`
            });

            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: parseInt(issueNum),
                name: 'needs-triage'
              });
            } catch (e) {
              console.log('Could not remove needs-triage label:', e.message);
            }

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: parseInt(issueNum),
              labels: ['copilot-triaging']
            });

            console.log(`Opened spec PR #${pr.number} and moved issue #${issueNum} to copilot-triaging`);
