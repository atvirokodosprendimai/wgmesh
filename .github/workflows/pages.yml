name: Deploy Dashboard to GitHub Pages

on:
  push:
    branches: [main]
    paths: ['docs/**']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          # Pages was disabled on this repo around 2026-04-30 (root cause
          # unclear — possibly during the chimney-to-Hetzner migration).
          # Every push to docs/** has failed since with `Get Pages site
          # failed` 404. `enablement: true` tells configure-pages to
          # auto-create the Pages site on first run if absent. After it
          # lands, the workflow deploys to atvirokodosprendimai.github.io/wgmesh
          # and stays self-healing.
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
